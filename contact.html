```html
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
overflow:hidden;
position:relative;
}

/* Background circles */

body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:#3b82f6;
border-radius:50%;
filter:blur(170px);
top:-120px;
left:-100px;
opacity:.45;
}

body::after{
content:"";
position:absolute;
width:450px;
height:450px;
background:#06b6d4;
border-radius:50%;
filter:blur(170px);
bottom:-150px;
right:-120px;
opacity:.45;
}

.container{

width:1100px;
max-width:95%;
display:grid;
grid-template-columns:1fr 1fr;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.5);
z-index:10;

}

.left{

padding:60px;
color:white;

}

.left h1{

font-size:45px;
margin-bottom:15px;

}

.left p{

color:#cbd5e1;
line-height:1.8;
margin-bottom:40px;

}

.info{

display:flex;
align-items:center;
margin-bottom:30px;

}

.icon{

width:60px;
height:60px;
background:linear-gradient(135deg,#38bdf8,#2563eb);
display:flex;
justify-content:center;
align-items:center;
border-radius:18px;
font-size:24px;
margin-right:20px;

}

.info h3{

margin-bottom:5px;

}

.info span{

color:#94a3b8;

}

.social{

margin-top:40px;

}

.social a{

text-decoration:none;
color:white;
font-size:28px;
margin-right:20px;
transition:.4s;

}

.social a:hover{

color:#38bdf8;
transform:translateY(-6px);

}

.right{

background:rgba(255,255,255,.04);
padding:60px;

}

form{

display:flex;
flex-direction:column;

}

input,
textarea{

padding:18px;
margin-bottom:20px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
transition:.3s;

}

input:focus,
textarea:focus{

background:rgba(255,255,255,.13);
box-shadow:0 0 15px #38bdf8;

}

textarea{

height:180px;
resize:none;

}

button{

padding:18px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#38bdf8,#2563eb);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.35s;

}

button:hover{

transform:translateY(-5px);
box-shadow:0 15px 35px rgba(56,189,248,.5);

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.left,
.right{

padding:35px;

}

.left h1{

font-size:35px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>Let's Talk 👋</h1>

<p>
Loyihangiz bormi? Yoki shunchaki salom demoqchimisiz?
Quyidagi forma orqali menga xabar yuboring.
</p>

<div class="info">

<div class="icon">📧</div>

<div>

<h3>Email</h3>

<span>youremail@gmail.com</span>

</div>

</div>

<div class="info">

<div class="icon">📞</div>

<div>

<h3>Telefon</h3>

<span>+998 90 123 45 67</span>

</div>

</div>

<div class="info">

<div class="icon">📍</div>

<div>

<h3>Manzil</h3>

<span>Uzbekistan</span>

</div>

</div>

<div class="social">

<a href="#">🌐</a>
<a href="#">📘</a>
<a href="#">📸</a>
<a href="#">▶️</a>

</div>

</div>

<div class="right">

<form>

<input type="text" placeholder="Ismingiz">

<input type="email" placeholder="Email">

<input type="text" placeholder="Mavzu">

<textarea placeholder="Xabaringiz..."></textarea>

<button>Send Message 🚀</button>

</form>

</div>

</div>

</body>
</html>
```
