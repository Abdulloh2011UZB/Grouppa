<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Rooms</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins, sans-serif;
}

body{
    background:#fff;
}

.rooms{
    position:relative;
    padding:100px 8%;
    overflow:hidden;
    background:linear-gradient(135deg,#fff8f8,#ffe8ef,#fff7d6);
}

/* blur background circles */
.rooms::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#ff7eb3;
    border-radius:50%;
    filter:blur(130px);
    top:-150px;
    left:-120px;
    opacity:.35;
}

.rooms::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#ffd166;
    border-radius:50%;
    filter:blur(120px);
    bottom:-120px;
    right:-100px;
    opacity:.35;
}

.container{
    position:relative;
    z-index:2;
}

.title{
    text-align:center;
    margin-bottom:60px;
}

.title h1{
    font-size:50px;
    color:#ff4d8d;
}

.title p{
    color:#666;
    margin-top:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:35px;
}

.card{
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(18px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 25px 45px rgba(255,77,141,.25);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.info{
    padding:25px;
}

.info h2{
    color:#333;
    margin-bottom:10px;
}

.info p{
    color:#666;
    line-height:1.6;
}

.bottom{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    color:#ff4d8d;
    font-size:24px;
    font-weight:bold;
}

button{
    padding:10px 22px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff4d8d,#ff8a65);
    color:#fff;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<section class="rooms">

<div class="container">

<div class="title">
<h1>Ice Cream Rooms</h1>
<p>Sweet, Cool & Delicious Experience</p>
</div>

<div class="cards">

<!-- CARD 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=800" alt="Ice Cream">
<div class="info">
<h2>Strawberry Room</h2>
<p>Soft pink sweet strawberry themed room.</p>
<div class="bottom">
<span class="price">25 000 so'm</span>
<button>Sotib olish</button>
</div>
</div>
</div>

<!-- CARD 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1579954115545-a95591f28bfc?w=800" alt="Ice Cream">
<div class="info">
<h2>Chocolate Room</h2>
<p>Dark chocolate luxury ice cream style room.</p>
<div class="bottom">
<span class="price">30 000 so'm</span>
<button>Sotib olish</button>
</div>
</div>
</div>

<!-- CARD 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=800" alt="Ice Cream">
<div class="info">
<h2>Vanilla Room</h2>
<p>Clean, soft and elegant vanilla style room.</p>
<div class="bottom">
<span class="price">35 000 so'm</span>
<button>Sotib olish</button>
</div>
</div>
</div>

</div>

</div>

</section>

</body>
</html>
